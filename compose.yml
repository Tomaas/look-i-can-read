services:
  app:
    build:
      context: .
      args:
        VITE_CHILD_NAME: ${VITE_CHILD_NAME:-}
    image: look-i-can-read
    container_name: look-i-can-read
    env_file: .env.production
    ports:
      # Loopback only — the app has no auth; exposing it beyond this
      # machine must be a deliberate operator choice.
      - "127.0.0.1:3009:3009"
    volumes:
      # Generated images/audio (the db itself is remote Turso).
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
